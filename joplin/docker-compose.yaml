version: '3'

services:
    db:
        image: postgres:16
        volumes:
            - joplindb:/var/lib/postgresql/data
        ports:
            - "5444:5444"
        restart: unless-stopped
        environment:
            - POSTGRES_PASSWORD={POSTGRES_PASSWORD}
            - POSTGRES_USER=notesjp
            - POSTGRES_DB=notesjp
    app:
        image: joplin/server:latest
        depends_on:
            - db
        ports:
            - "22300:22300"
        restart: unless-stopped
        environment:
            - APP_PORT=${APP_PORT}
            - APP_BASE_URL={APP_BASE_URL}
            - DB_CLIENT={DB_CLIENT}
            - POSTGRES_PASSWORD={POSTGRES_PASSWORD}
            - POSTGRES_DATABASE={POSTGRES_DATABASE}
            - POSTGRES_USER={POSTGRES_USER}
            - POSTGRES_PORT={POSTGRES_PORT}
            - POSTGRES_HOST={POSTGRES_HOST}
            - MAILER_ENABLED={MAILER_ENABLED}
            - MAILER_HOST={MAILER_HOST}
            - MAILER_PORT={MAILER_PORT}
            - MAILER_SECURE={MAILER_SECURE}
            - MAILER_AUTH_USER={MAILER_AUTH_USER}
            - MAILER_AUTH_PASSWORD={MAILER_AUTH_PASSWORD}
            - MAILER_NOREPLY_NAME={MAILER_NOREPLY_NAME}
            - MAILER_NOREPLY_EMAIL={MAILER_NOREPLY_EMAIL}
volumes:
  joplindb: